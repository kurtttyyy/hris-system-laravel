[build]
builder = "NIXPACKS"
buildCommand = "rm -f bootstrap/cache/*.php && composer install --no-dev --optimize-autoloader --no-scripts && npm ci && npm run build"

[deploy]
startCommand = "rm -f bootstrap/cache/*.php && php artisan migrate --force && (php artisan storage:link || true) && php artisan serve --host=0.0.0.0 --port=$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
